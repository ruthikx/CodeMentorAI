# Required GitHub Actions secrets for CI:
# - DATABASE_URL: PostgreSQL connection string for the isolated CI/test database.
#
# Deploy-only secrets are not required by this workflow:
# - VERCEL_TOKEN
# - VERCEL_DEPLOY_HOOK_URL
# - RENDER_DEPLOY_HOOK_URL
# - RENDER_PRISMA_MIGRATE_HOOK_URL
# - RENDER_BACKEND_URL
# - GROQ_API_KEY

name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm turbo run lint

      - name: TypeScript
        run: pnpm turbo run typecheck

      - name: Jest
        run: pnpm turbo run test
